{% extends 'base.html' %}
{% block title %}Login - LeaveMS{% endblock %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-calendar-check text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 fw-bold">Leave Management System</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <hr>
                <div class="text-center">
                    <span class="text-muted">Don't have an account?</span>
                    <a href="{{ url_for('register') }}" class="ms-1 fw-semibold">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
